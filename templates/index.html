<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StegoCast - Premium Video Steganography</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        /* Glassmorphism Panel */
        .panel {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out backwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .video-container {
            width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            position: relative;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
        }

        .video-feed {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            border-radius: 1rem;
        }

        .status-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .fullscreen-btn:hover {
            background: rgba(59, 130, 246, 0.8);
            transform: scale(1.05);
        }

        .fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        .controls {
            animation-delay: 0.2s;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 0.8rem;
            border: 1px solid var(--surface-border);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 1rem 2rem;
            border-radius: 0.8rem;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
            background: linear-gradient(135deg, var(--primary-hover), #7c3aed);
        }

        button:active {
            transform: translateY(1px);
        }

        #notification {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
            font-size: 0.9rem;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        select {
            padding: 1rem 1.5rem;
            border-radius: 0.8rem;
            border: 1px solid var(--surface-border);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .decoder-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--surface-border);
            border-radius: 0.8rem;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .decoder-icon {
            color: #4ade80;
            font-size: 1.5rem;
            animation: pulse-text 2s infinite;
        }

        .decoded-text {
            color: #4ade80;
            font-family: monospace;
            font-size: 1.1rem;
            word-break: break-all;
        }

        @keyframes pulse-text {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @media (max-width: 768px) {
            .input-wrapper {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>StegoCast</h1>
        <p class="subtitle">DWT-QIM Robust Video Steganography Server</p>
    </header>

    <div class="container">
        
        <div class="panel">
            <div class="video-container" id="videoContainer">
                <div class="status-badge">
                    <div class="dot"></div>
                    LIVE: ENCODED STREAM
                </div>
                <img src="/video_feed" class="video-feed" id="videoFeed" alt="Video Stream">
                <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Tam Ekran">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="panel controls">
            <div class="form-group">
                <label for="cameraSelect">OBS Kamera Kaynağı</label>
                <div class="input-wrapper">
                    <select id="cameraSelect" onchange="changeCamera()">
                        <option value="0">Kamera ID: 0 (Varsayılan/Webcam)</option>
                        <option value="1" selected>Kamera ID: 1 (Sanal Kamera)</option>
                        <option value="rtmp://localhost:1935/live/obs">RTMP Sunucusundan Al (OBS Yayın)</option>
                        <option value="2">Kamera ID: 2</option>
                        <option value="3">Kamera ID: 3</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 1.5rem;">
                <label for="secretMessage">Veri Enjeksiyon Paneli</label>
                <div class="input-wrapper">
                    <input type="text" id="secretMessage" placeholder="Videonun içine gömülecek gizli mesajı girin...">
                    <button onclick="updateMessage()">Mesajı Gönder</button>
                </div>
                <div id="notification"></div>
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Canlı Şifre Çözücü (Decoder)</label>
                <div class="decoder-panel">
                    <div class="decoder-icon">⚡</div>
                    <div class="decoded-text" id="decodedMessage">Okunuyor...</div>
                </div>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem;">Bu panel sunucunun videoyu anlık olarak şifreleyip, sorunsuz bir şekilde geri okuyabildiğini doğrular.</p>
            </div>
        </div>

    </div>

    <script>
        function toggleFullscreen() {
            const videoElement = document.getElementById('videoFeed');
            if (!document.fullscreenElement) {
                if (videoElement.requestFullscreen) {
                    videoElement.requestFullscreen();
                } else if (videoElement.webkitRequestFullscreen) { /* Safari */
                    videoElement.webkitRequestFullscreen();
                } else if (videoElement.msRequestFullscreen) { /* IE11 */
                    videoElement.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function changeCamera() {
            const camId = document.getElementById('cameraSelect').value;
            fetch('/api/set_camera', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ camera_id: camId })
            })
            .then(res => res.json())
            .then(data => {
                const notif = document.getElementById('notification');
                if (data.status === 'success') {
                    notif.style.color = '#4ade80';
                    notif.style.background = 'rgba(34, 197, 94, 0.1)';
                    notif.style.borderColor = 'rgba(34, 197, 94, 0.2)';
                } else {
                    notif.style.color = '#f87171';
                    notif.style.background = 'rgba(248, 113, 113, 0.1)';
                    notif.style.borderColor = 'rgba(248, 113, 113, 0.2)';
                }
                notif.innerText = data.message;
                showNotification(notif);
            });
        }

        // Canlı decoder verisini her saniye çek
        setInterval(() => {
            fetch('/api/get_message')
            .then(res => res.json())
            .then(data => {
                document.getElementById('decodedMessage').innerText = data.decoded_message || "Veri bulunamadı...";
            })
            .catch(err => console.error(err));
        }, 1000);

        function updateMessage() {
            const messageInput = document.getElementById('secretMessage');
            const message = messageInput.value;
            const notif = document.getElementById('notification');

            if (!message.trim()) {
                notif.style.color = '#f87171';
                notif.style.background = 'rgba(248, 113, 113, 0.1)';
                notif.style.borderColor = 'rgba(248, 113, 113, 0.2)';
                notif.innerText = "Mesaj boş olamaz!";
                showNotification(notif);
                return;
            }

            fetch('/api/set_message', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    notif.style.color = '#4ade80';
                    notif.style.background = 'rgba(34, 197, 94, 0.1)';
                    notif.style.borderColor = 'rgba(34, 197, 94, 0.2)';
                    notif.innerText = data.message;
                    messageInput.value = '';
                }
                showNotification(notif);
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }

        function showNotification(el) {
            el.style.display = 'block';
            // Trigger reflow
            void el.offsetWidth;
            el.style.opacity = '1';
            
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.style.display = 'none', 300);
            }, 3000);
        }
        
        // Enter key support
        document.getElementById("secretMessage").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                updateMessage();
            }
        });
    </script>
</body>
</html>
